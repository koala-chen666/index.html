        /* Google Doc Iframe 容器 */
        .doc-container {

        }

            height: 100%;
            border: none;
        }

        .modal-enter { opacity: 0; transform: scale(0.95); }

        @keyframes flash-red { 0% { color: #ef4444; background-color: #fef2f2; } 100% { color: inherit; background-color: transparent; } } /* 漲 */

        // --- 渲染功能 ---
        const grid = document.getElementById('stockGrid');

        function renderStocks(filter) {
            grid.innerHTML = '';
            const filtered = filter === 'all' ? stocks : stocks.filter(s => s.category === filter);

            filtered.forEach(stock => {
                const hasDoc = stock.docUrl && stock.docUrl.length > 10;
                
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl p-6 shadow-sm border border-slate-200 stock-card flex flex-col justify-between h-full group cursor-pointer';
                card.onclick = (e) => {
                    // 避免點到連結時觸發 Modal
                    if(e.target.tagName !== 'A' && stock.id !== '') openModal(stock.id);
                    if(stock.id === '' && stock.docUrl) window.open(stock.docUrl, '_blank'); // 產業地圖直接開新分頁
                };

                // 處理價格顯示 (如果有 Code 才顯示價格區塊)
                const priceBlock = stock.code ? `
                    <div class="flex flex-col">
                        <span class="text-[10px] text-slate-400 uppercase">Current Price</span>
                        <span id="price-${stock.code}" class="font-mono text-xl font-bold text-slate-800 transition-colors duration-500">${stock.price}</span>
                    </div>
                ` : '<div></div>'; // 佔位符

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-xs font-mono text-slate-400">${stock.code ? 'TW:' + stock.code : 'TOOL'}</span>
                                <h3 class="text-xl font-bold text-slate-800 group-hover:text-indigo-600 transition-colors">${stock.name}</h3>
                            </div>
                            ${stock.rating ? `<span class="${stock.ratingClass} px-2 py-1 rounded text-xs font-bold">${stock.rating}</span>` : ''}
                        </div>
                        <p class="text-slate-600 text-sm mb-4 leading-relaxed">${stock.desc}</p>
                    </div>
                    
                    <div class="pt-4 border-t border-slate-100 flex justify-between items-center mt-auto">
                        ${priceBlock}
                        <div class="flex items-center gap-1 text-xs font-medium ${hasDoc ? 'text-indigo-600' : 'text-slate-400'}">
                            ${hasDoc ? '📄 查看詳情' : '⚠️ 暫無報告'}
                            ${hasDoc ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>' : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Filter Logic ---
        function filterStocks(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-slate-800', 'text-white');
                b.classList.add('bg-white', 'text-slate-600');
            });
            btn.classList.remove('bg-white', 'text-slate-600');
            btn.classList.add('bg-slate-800', 'text-white');
            renderStocks(category);
            fetchStockPrices(); // 篩選後重新更新價格綁定
        }

        // --- 即時報價功能 (Fetch CSV) ---
        async function fetchStockPrices() {
            if (!googleSheetCSVUrl) return;

            const icon = document.getElementById('refreshIcon');
            icon.classList.add('animate-spin');

            try {
                const response = await fetch(googleSheetCSVUrl);
                const csvText = await response.text();
                
                // 簡單解析 CSV (格式假設: StockCode, Price)
                const rows = csvText.split('\n').map(row => row.split(','));
                
                rows.forEach(row => {
                    if (row.length < 2) return;
                    // 清理資料
                    const code = row[0].replace(/['"]/g, '').trim(); // 股票代號
                    const priceRaw = row[1].replace(/['"]/g, '').trim(); // 價格
                    const price = parseFloat(priceRaw);

                    if (code && !isNaN(price)) {
                        updatePriceDOM(code, price);
                    }
                });

                // 更新時間
                const now = new Date();
                document.getElementById('lastUpdateTime').innerText = now.toLocaleTimeString();

            } catch (error) {
                console.error("無法抓取股價:", error);
            } finally {
                setTimeout(() => icon.classList.remove('animate-spin'), 500);
            }
        }

        function updatePriceDOM(code, newPrice) {
            const el = document.getElementById(`price-${code}`);
            if (!el) return;

            const oldPrice = parseFloat(el.innerText);
            
            // 如果價格沒變，就不做任何事
            if (oldPrice === newPrice) return;

            el.innerText = newPrice; // 這裡不強制 toFixed(1)，保留 Google Sheet 的格式

            // 簡單的動畫
            el.classList.remove('price-up', 'price-down');
            void el.offsetWidth; // Trigger reflow
            
            if (newPrice > oldPrice) {
                el.classList.add('price-up'); // 紅色 (台股慣例)
            } else if (newPrice < oldPrice) {
                el.classList.add('price-down'); // 綠色
            }
        }

        // --- Modal Logic ---
        const modal = document.getElementById('docModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalCode = document.getElementById('modalCode');
        const docFrame = document.getElementById('docFrame');
        const externalLink = document.getElementById('externalLink');
        const loadingSpinner = document.getElementById('loadingSpinner');

        function openModal(id) {
            const stock = stocks.find(s => s.id === id);
            if (!stock) return;

            // 注意：edit 連結通常無法嵌入，建議換成 publish 連結
            // 這裡直接使用 docUrl
            const targetUrl = stock.docUrl || 'about:blank';

            modalTitle.innerText = `${stock.name} - 詳細研究報告`;
            modalCode.innerText = `Stock Code: ${stock.code}`;
            externalLink.href = targetUrl;
            
            // 顯示 Loading
            loadingSpinner.style.display = 'flex';
            
            // 設定 Iframe
            docFrame.src = targetUrl;
            
            docFrame.onload = () => {
                loadingSpinner.style.display = 'none';
            };

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.querySelector('div.modal-enter').classList.add('modal-enter-active');
            }, 10);
        }

        function closeModal() {
            const content = modal.querySelector('div.modal-enter');
            content.classList.remove('modal-enter-active');
            content.classList.add('modal-exit');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                content.classList.remove('modal-exit');
                docFrame.src = ''; 
            }, 200);
        }

        // Init
        renderStocks('all');
        
        // 自動更新 (頁面載入時 + 1秒)
        window.onload = fetchStockPrices;
        setInterval(fetchStockPrices, 1000);

    </script>
